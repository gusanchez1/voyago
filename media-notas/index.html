<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cálculo de Média Final</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    .container {
      width: 380px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      transition: 0.3s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input:focus {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2);
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: rgba(0, 255, 150, 0.1);
      border: 1px solid rgba(0, 255, 150, 0.3);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .resultado strong {
      color: #00ffcc;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Média do Aluno</h2>

    <label>RM</label>
    <input type="text" id="rm" placeholder="Digite o RM">

    <label>Nome</label>
    <input type="text" id="nome" placeholder="Digite o nome">

    <label>Nota 1</label>
    <input type="number" id="nota1" step="0.1" placeholder="Ex: 7.5">

    <label>Nota 2</label>
    <input type="number" id="nota2" step="0.1" placeholder="Ex: 8.0">

    <button onclick="calcularMedia()">Calcular Média</button>

    <div id="resultado" class="resultado" style="display:none;"></div>
  </div>

  <script>
    function calcularMedia() {

      const rm = document.getElementById("rm").value;
      const nome = document.getElementById("nome").value;
      const nota1 = parseFloat(document.getElementById("nota1").value);
      const nota2 = parseFloat(document.getElementById("nota2").value);

      if (!rm || !nome || isNaN(nota1) || isNaN(nota2)) {
        alert("Por favor, preencha todos os campos corretamente.");
        return;
      }

      const peso1 = 0.3;
      const peso2 = 0.7;

      const media = (nota1 * peso1) + (nota2 * peso2);

      const resultadoDiv = document.getElementById("resultado");
      resultadoDiv.style.display = "block";
      resultadoDiv.innerHTML = `
        <strong>Resultado:</strong><br>
        RM: ${rm}<br>
        Nome: ${nome}<br>
        Nota 1: ${nota1} (Peso 30%)<br>
        Nota 2: ${nota2} (Peso 70%)<br>
        <strong>Média Final: ${media.toFixed(2)}</strong>
      `;
    }
  </script>

</body>
</html>
